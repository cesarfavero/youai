name: Feature request
description: Suggest an idea for YouAI
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Check [NEXT_STEPS.md](../../docs/NEXT_STEPS.md) — the MVP has a fixed implementation order. Large features may be deferred to later phases.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: MVP phase fit
      options:
        - Phase 0 — dogfood
        - Phase 1 — MVP network
        - Phase 2+ — post-MVP
        - Not sure