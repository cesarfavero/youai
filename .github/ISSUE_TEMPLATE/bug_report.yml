name: Bug report
description: Something is broken or not working as expected
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Security issues (guard bypass, sandbox escape) must **not** be reported here — see [SECURITY.md](../../docs/SECURITY.md).

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - youai-guard
        - youai-node
        - youai-worker
        - youai-coordinator
        - youai-web
        - docs / CI
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. cargo run -p youai-guard -- ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.1.0 or git SHA

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04, macOS 15